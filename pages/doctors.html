<section id="content">
  <div class="doctors-wrap">

    <span class="section-eyebrow fade-in">Our Team</span>

    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/public-nav.js"></script>
<script>
  document.querySelectorAll('.nav-links a, .nav-login, .nav-book').forEach(link => {
    link.addEventListener('click', function(e) {
      const href = this.getAttribute('href');
      if (href && !href.startsWith('#') && !href.startsWith('javascript')) {
        e.preventDefault();
        document.body.style.cssText = 'opacity:0;transform:translateY(8px);transition:opacity .25s ease,transform .25s ease';
        setTimeout(() => { window.location.href = href; }, 80);
      }
    });
  });

  const INITIALS_COLORS = ['#E8891C','#374151','#2563eb','#059669','#7c3aed','#dc2626','#0891b2'];
  function initials(name) {
    return name.split(' ').filter(Boolean).map(w => w[0]).slice(0,2).join('').toUpperCase();
  }
  function avatarColor(name) {
    return INITIALS_COLORS[name.charCodeAt(0) % INITIALS_COLORS.length];
  }
  function calIcon() {
    return `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
  }
  function formatDays(days) {
    if (!days || !days.length) return 'By appointment';
    const ordered = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const sorted  = days.slice().sort((a,b) => ordered.indexOf(a) - ordered.indexOf(b));
    // Collapse consecutive days into ranges: Mon, Tue, Wed → Mon – Wed
    const ranges = [];
    let start = sorted[0], prev = sorted[0];
    for (let i = 1; i < sorted.length; i++) {
      const cur = sorted[i];
      if (ordered.indexOf(cur) === ordered.indexOf(prev) + 1) { prev = cur; continue; }
      ranges.push(start === prev ? start : start + ' – ' + prev);
      start = prev = cur;
    }
    ranges.push(start === prev ? start : start + ' – ' + prev);
    return ranges.join(', ');
  }

  fetch('../api/doctors/public.php')
    .then(r => r.json())
    .then(data => {
      const grid = document.getElementById('doctors-grid');
      if (!data.success || !data.doctors.length) {
        grid.className = 'doctors-grid';
        grid.innerHTML = '<p style="color:#9ca3af;font-size:.85rem;text-align:center;padding:40px 0">No doctors listed at this time.</p>';
        return;
      }
      grid.className = 'doctors-grid row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5';
      grid.innerHTML = data.doctors.map((doc, i) => {
        const color  = avatarColor(doc.name);
        const photo  = doc.photoUrl
          ? `<img src="../${doc.photoUrl}" alt="${doc.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        const fallback = `<div class="doctor-initials" style="background:linear-gradient(135deg,${color},${color}cc);${doc.photoUrl ? 'display:none' : 'display:flex'}">${initials(doc.name)}</div>`;
        return `
        <div class="col">
          <div class="doctor-card fade-in">
            <div class="doctor-photo-wrap">${photo}${fallback}</div>
            <div class="doctor-name">${doc.name}</div>
            <div class="doctor-role">${doc.specialization}</div>
            <div class="doctor-degree">OD</div>
            <div class="doctor-schedule">${calIcon()} ${formatDays(doc.days)}</div>
          </div>
        </div>`;
      }).join('');
      document.querySelectorAll('.fade-in').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 100 + i * 70);
      });
    })
    .catch(() => {
      const grid = document.getElementById('doctors-grid');
      grid.className = 'doctors-grid';
      grid.innerHTML =
        '<p style="color:#9ca3af;font-size:.85rem;text-align:center;padding:40px 0">Could not load doctors. Please try again later.</p>';
    });
</script>

</body>
</html>
